<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; }
#aplus-container {
    width: {{WIDTH}}px;
    background: linear-gradient(135deg, #faf8f5 0%, #f5f0eb 50%, #faf8f5 100%);
    font-family: 'Inter', sans-serif;
    color: #1a1a1a;
    overflow: hidden;
}
.hero-wrapper { display: flex; min-height: 500px; }
.hero-left { flex: 1; padding: 60px 40px 60px 50px; display: flex; flex-direction: column; justify-content: center; }
.hero-right { width: 380px; display: flex; align-items: center; justify-content: center; padding: 30px; position: relative; }
.hero-right img { max-width: 100%; max-height: 420px; object-fit: contain; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15)); }
.brand-name { font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: #8b7355; margin-bottom: 16px; }
.hero-headline { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; line-height: 1.15; margin-bottom: 14px; }
.hero-tagline { font-size: 16px; font-weight: 300; color: #555; margin-bottom: 36px; line-height: 1.5; }
.benefits-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.benefit-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; background: rgba(255,255,255,0.7); border-radius: 10px; border: 1px solid rgba(139,115,85,0.1); }
.benefit-icon { font-size: 20px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f5efe8, #ece3d5); border-radius: 8px; flex-shrink: 0; }
.benefit-text .benefit-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.benefit-text .benefit-desc { font-size: 11px; color: #777; line-height: 1.3; }
.accent-line { width: 50px; height: 3px; background: linear-gradient(90deg, #8b7355, #c4a97d); border-radius: 2px; margin-bottom: 20px; }
.hero-cta { display: inline-block; margin-top: 28px; padding: 12px 32px; background: linear-gradient(135deg, #1a1a1a, #333); color: #fff; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border-radius: 6px; }
.decorative-circle { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(196,169,125,0.08), transparent); top: 50%; right: -50px; transform: translateY(-50%); }
</style>
</head>
<body>
<div id="aplus-container">
    <div class="hero-wrapper">
        <div class="hero-left">
            <div class="brand-name" id="brand"></div>
            <div class="accent-line"></div>
            <div class="hero-headline" id="headline"></div>
            <div class="hero-tagline" id="tagline"></div>
            <div class="benefits-row" id="benefits"></div>
            <div class="hero-cta" id="cta"></div>
        </div>
        <div class="hero-right">
            <div class="decorative-circle"></div>
            <img id="product-image" src="" alt="product">
        </div>
    </div>
</div>
<script>
const data = {{DATA_JSON}};
document.getElementById('brand').textContent = data.brand_name || '';
document.getElementById('headline').textContent = data.headline || '';
document.getElementById('tagline').textContent = data.tagline || '';
document.getElementById('cta').textContent = data.cta || 'Shop Now';
if (data.product_image) document.getElementById('product-image').src = data.product_image;
const b = document.getElementById('benefits');
(data.benefits || []).forEach(x => {
    b.innerHTML += '<div class="benefit-item"><div class="benefit-icon">'+x.icon_emoji+'</div><div class="benefit-text"><div class="benefit-title">'+x.title+'</div><div class="benefit-desc">'+x.desc+'</div></div></div>';
});
</script>
</body>
</html>
