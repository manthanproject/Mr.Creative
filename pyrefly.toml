python-version = "3.12"
project-excludes = ["modules/selenium_bot.py"]

[tool.pyrefly]
exclude = ["modules/selenium_bot.py"]

[errors]
# SQLAlchemy declarative models accept column kwargs at runtime via
# `_declarative_constructor`, but Pyrefly sees only `object.__init__`
# and flags every kwarg as "unexpected". Suppress those false positives.
bad-argument-count = false
unexpected-keyword = false
